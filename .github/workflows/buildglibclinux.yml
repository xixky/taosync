name: buildglibclinux

on:
  workflow_dispatch:

env:
  APP_NAME: taoSync

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.getVersion.outputs.VERSION }}
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
      - id: getVersion
        run: |
          versions=$(head -n 1 version.txt)
          IFS=',' read -ra versionList <<< "$versions"
          echo "VERSION=${versionList[0]}" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: [ get-version ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "14.x"
      - run: |
          sed -i "s/__version_placeholder__/${{ needs.get-version.outputs.VERSION }}/g" frontend/src/views/page/setting/index.vue
          cd frontend && npm install && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-linux:
    name: 构建Linux多平台 (StaticX 静态封装)
    runs-on: ubuntu-latest
    needs: [ get-version, build-frontend ]
    strategy:
      matrix:
        platform: [ "amd64", "arm64", "arm32" ]
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置环境变量
        run: |
          case "${{ matrix.platform }}" in
            amd64) echo "T_ARCH=amd64" >> $GITHUB_ENV ;;
            arm64) echo "T_ARCH=arm64" >> $GITHUB_ENV ;;
            arm32) echo "T_ARCH=arm/v7" >> $GITHUB_ENV ;;
          esac

      - name: Docker 静态构建与权限修复
        run: |
          case "${{ matrix.platform }}" in
            amd64)   IMG="python:3.11-slim-bullseye" ; LIB="/usr/lib/x86_64-linux-gnu" ;;
            arm64)   IMG="arm64v8/python:3.11-slim-bullseye" ; LIB="/usr/lib/aarch64-linux-gnu" ;;
            arm32)   IMG="arm32v7/python:3.11-slim-bullseye" ; LIB="/usr/lib/arm-linux-gnueabihf" ;;
          esac

          docker run --rm \
            --platform linux/${{ env.T_ARCH }} \
            -v "$(pwd):/app" \
            -w /app \
            -e APP_NAME=${{ env.APP_NAME }} \
            -e LIB_PATH=$LIB \
            $IMG \
            sh -c '
              set -e
              apt-get update && apt-get install -y build-essential zlib1g-dev patchelf && rm -rf /var/lib/apt/lists/*
              python -m pip install --upgrade pip
              python -m pip install "pyinstaller>=6,<7" staticx -r requirements.txt
              
              export LD_LIBRARY_PATH=/usr/local/lib:$LIB_PATH
              python -m PyInstaller "$APP_NAME.spec" --distpath "/app/dist/${{ matrix.platform }}" --workpath "/app/build/${{ matrix.platform }}" --noconfirm
              
              # StaticX 封装
              staticx "/app/dist/${{ matrix.platform }}/$APP_NAME" "/app/dist/${{ matrix.platform }}/${APP_NAME}_static"
              mv -f "/app/dist/${{ matrix.platform }}/${APP_NAME}_static" "/app/dist/${{ matrix.platform }}/$APP_NAME"
              chmod +x "/app/dist/${{ matrix.platform }}/$APP_NAME"

              # 【终极权限修复】
              # 打印当前宿主机用户 ID 确保准确，并递归修改 dist 目录
              # GitHub Actions 默认 UID:GID 是 1001:121
              chown -R 1001:121 /app/dist
              chmod -R 755 /app/dist
            '

      - name: 打包产物
        run: |
          # 检查文件权限（调试用）
          ls -lh dist/${{ matrix.platform }}/
          tar -czf "taoSync-linux-static-${{ matrix.platform }}.tar.gz" -C "dist/${{ matrix.platform }}" .

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taoSync-linux-static-${{ matrix.platform }}
          path: taoSync-linux-static-${{ matrix.platform }}.tar.gz
